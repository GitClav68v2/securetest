<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>San Francisco Chronicle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 18px solid hotpink;
    }

    .page {
      position: relative;
      /* The Chronicle image is 672×412 — maintain that ratio */
      width: min(100vw, calc(100vh * 672 / 412));
      height: min(100vh, calc(100vw * 412 / 672));
    }

    .chronicle-img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill;
    }

    .unmute-btn {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: hotpink;
      color: white;
      font-size: 1.4rem;
      font-weight: bold;
      padding: 12px 28px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      letter-spacing: 1px;
    }
    .unmute-btn:hover { background: #ff69b4; }
    .unmute-btn.hidden { display: none; }

    /* Video overlaid exactly where Fred's photo is in the Chronicle */
    .fred-video {
      position: absolute;
      /* Tuned to the photo cutout in the 672×412 image */
      left: 34%;
      top: 57%;
      width: 25%;
      height: 44%;
      object-fit: cover;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="page">
    <img class="chronicle-img" src="assets/images/fred-chronicle.jpg" alt="San Francisco Chronicle">
    <video class="fred-video"
      src="assets/images/fred-video.mp4"
      loop
      muted
      playsinline
      id="fredVid">
    </video>
  </div>

  <audio src="assets/images/fred-audio.mp3" id="fredAudio"></audio>
  <button class="unmute-btn" id="unmuteBtn">🔊 TAP FOR SOUND</button>

  <script>
    const vid = document.getElementById('fredVid');
    const audio = document.getElementById('fredAudio');
    const btn = document.getElementById('unmuteBtn');

    vid.play();

    // Try to autoplay the MP3
    audio.play().then(() => {
      btn.classList.add('hidden');
    }).catch(() => {
      // Browser blocked it — wait for tap
    });

    btn.addEventListener('click', () => {
      audio.play();
      btn.classList.add('hidden');
    });

    vid.addEventListener('click', () => {
      audio.play();
      btn.classList.add('hidden');
    });
  </script>

</body>
</html>
